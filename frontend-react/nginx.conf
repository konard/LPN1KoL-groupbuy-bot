server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so upstream hostnames are resolved
    # at request time rather than at nginx startup.  This prevents nginx from
    # failing to start when a dependent service (e.g. websocket-server) is not
    # yet available.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Declare upstream variables at server level so nginx registers them before
    # any request is processed.  Without these declarations the worker logs
    # "using uninitialized variable" even though each location block assigns
    # the variable via `set` — nginx requires variables to be known at config
    # parse time when they are referenced by proxy_pass.
    set $core_upstream    http://core:8000;
    set $gateway_upstream http://gateway:3000;
    set $ws_upstream      http://websocket-server:8765;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy routing map ──────────────────────────────────────────────────────
    # The React client sends requests under /api/*.  The location blocks below
    # route them to the correct upstream without mangling the path:
    #
    #   /api/admin/*        → core:8000/api/admin/*     (preserved; Django admin_api)
    #   /api/v1/auth/*      → gateway:3000/api/v1/auth/* (preserved; gateway parses /api/v1/{svc}/{path})
    #   /api/auth/*         → gateway:3000/api/v1/auth/* (rewrite /api/auth → /api/v1/auth)
    #   /api/v1/*           → gateway:3000/api/v1/*     (preserved; other gateway microservices)
    #   /api/*              → core:8000/api/*            (preserved; FastAPI prefix is /api)

    # Proxy admin REST API to core backend (must come before generic /api/ block)
    location /api/admin/ {
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy /api/v1/auth/* to gateway — path preserved as /api/v1/auth/*
    # Gateway route is /api/v1/{service_name}/{path:path}, so it expects the full prefix.
    location /api/v1/auth/ {
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy /api/auth/* to gateway — rewrite to /api/v1/auth/* so gateway can route it
    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /api/v1/auth/$1 break;
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy /api/v1/* (non-auth) to gateway — path preserved (chat media, voting, etc.)
    location /api/v1/ {
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy all other /api/* requests to core backend — path preserved.
    # core-fastapi mounts routers under /api, so it expects /api/users/, /api/procurements/, etc.
    location /api/ {
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy WebSocket connections to websocket-server
    location /ws/ {
        set $ws_upstream http://websocket-server:8765;
        proxy_pass $ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # SPA fallback - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
