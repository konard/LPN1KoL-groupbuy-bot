server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so upstream hostnames are resolved
    # at request time rather than at nginx startup.  This prevents nginx from
    # failing to start when a dependent service (e.g. websocket-server) is not
    # yet available.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy routing map ──────────────────────────────────────────────────────
    # The React client calls domain-style paths (/api/users, /api/procurements,
    # /api/chat, /api/payments) while FastAPI routers on core use
    # a mix of /api-prefixed and unprefixed paths.  The location blocks below
    # normalize the mismatch:
    #
    #   /api/admin/*        → core:8000                 (preserved)
    #   /api/v1/auth/*      → gateway:3000/auth/*       (strip /api/v1; auth via gateway)
    #   /api/auth/*         → gateway:3000/auth/*       (strip /api; auth via gateway)
    #   /api/v1/*           → core:8000/api/v1/*        (preserved)
    #                         — chat/media, voting, search, notify, categories
    #   /api/users/*        → core:8000/api/users/*     (preserved)
    #   /api/procurements/* → core:8000/api/procurements/* (preserved)
    #   /api/chat/*         → core:8000/api/chat/*      (preserved)
    #   /api/payments/*     → core:8000/api/payments/*  (preserved)
    #   /api/*              → core:8000/*               (strip /api)

    # Proxy admin REST API to core backend (must come before generic /api/ block)
    location /api/admin/ {
        set $core_upstream http://core:8000;
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy user cabinet profile endpoints to core backend
    location /api/profile/ {
        rewrite ^/api/profile/(.*)$ /profile/$1 break;
        set $core_upstream http://core:8000;
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy /api/v1/auth/* to gateway (strips /api/v1, sends /auth/*)
    # Auth service is accessible via gateway:3000, not via core:8000
    location /api/v1/auth/ {
        rewrite ^/api/v1/auth/(.*)$ /auth/$1 break;
        set $gateway_upstream http://gateway:3000;
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy /api/auth/* to gateway (strips /api, sends /auth/*)
    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        set $gateway_upstream http://gateway:3000;
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy all other API requests to core backend, stripping the /api prefix.
    # Core routes: /users/*, /procurements/*, /categories/*,
    # /payments/*, /chat/*, /profile/*, /health
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        set $core_upstream http://core:8000;
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy WebSocket connections to websocket-server
    location /ws/ {
        set $ws_upstream http://websocket-server:8765;
        proxy_pass $ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # SPA fallback - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
