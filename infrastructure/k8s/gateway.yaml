---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: groupbuy
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: groupbuy/gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            # Monolith handles auth, purchases, payments (wallets/escrow), reputation
            - name: AUTH_SERVICE_URL
              value: "http://backend-monolith:4000"
            - name: PURCHASE_SERVICE_URL
              value: "http://backend-monolith:4000"
            - name: PAYMENT_SERVICE_URL
              value: "http://backend-monolith:4000"
            - name: REPUTATION_SERVICE_URL
              value: "http://backend-monolith:4000"
            # Unchanged infrastructure services
            - name: CHAT_SERVICE_URL
              value: "http://chat-service:4004"
            - name: SEARCH_SERVICE_URL
              value: "http://search-service:4007"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service:4006"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:4005"
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: RATE_LIMIT_RPM
              value: "60"
            - name: CORS_ORIGINS
              value: "https://app.example.com"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: groupbuy
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 3000
      name: http
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: groupbuy
type: Opaque
stringData:
  secret: super_secret_jwt_key_change_in_production
  refresh-secret: super_secret_refresh_key_change_in_production
