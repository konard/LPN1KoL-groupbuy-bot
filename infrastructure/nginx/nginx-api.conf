# Nginx configuration for API Server (Server 2)
# Handles REST API, React frontend, and admin panel
# For high-load production deployment

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Connection limiting (DDoS protection)
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Use Docker's internal DNS resolver so upstream hostnames are re-resolved
    # at request time.  Without this, nginx resolves all upstream addresses once
    # at startup and fails with "host not found" if a service is not yet up.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream core_api {
        server core:8000;
        keepalive 32;
    }

    upstream gateway {
        server gateway:3000;
        keepalive 16;
    }

    upstream django_admin_api {
        # FastAPI SQLAdmin panel served by the core backend at /admin
        server core:8000;
        keepalive 16;
    }

    upstream frontend {
        server frontend-react:80;
        keepalive 16;
    }

    upstream websocket {
        server websocket-server:8765;
    }

    # django_admin_backend is intentionally NOT declared as an upstream block.
    # Upstream blocks resolve hostnames at nginx startup; if the django-admin
    # container is not yet running when nginx starts, nginx exits with
    # "host not found in upstream".  Instead, proxy_pass uses a variable so
    # Docker's internal resolver (127.0.0.11) re-resolves the hostname on each
    # request — nginx defers the lookup until a request actually arrives.
    # The $django_admin_backend variable is set inside each location block that
    # needs it (see the server { listen 8000 } block below).

    # HTTP server — serves content directly when SSL is not yet configured,
    # and redirects to HTTPS once a certificate is available.
    server {
        listen 80;
        server_name _;

        # Allow up to 10 MB request bodies (matches HTTPS server block)
        client_max_body_size 10M;

        # Health check (keep on HTTP for load balancers)
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Let's Encrypt ACME challenge (used by certbot for certificate issuance/renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Admin panel via HTTP (FastAPI SQLAdmin)
        location /admin {
            proxy_pass http://django_admin_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Legacy admin API prefix — also handled by FastAPI core
        location /api/admin/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://django_admin_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Legacy auth endpoints via HTTP — route stale clients to FastAPI gateway.
        # The gateway keeps /auth/* as an alias for auth-service root routes.
        location /auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Legacy React auth endpoints via HTTP — older bundles call
        # /api/auth/* while the gateway's public contract is /api/v1/auth/*.
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            rewrite ^/api/auth/(.*)$ /api/v1/auth/$1 break;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Versioned API endpoints via HTTP — routed to the FastAPI gateway
        location /api/v1/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Legacy API endpoints via HTTP (for access by IP before SSL is set up)
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://core_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket via HTTP
        location /ws/ {
            proxy_pass http://websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # React frontend via HTTP (admin panel + main app accessible by IP)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 512k;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }
    }

    # HTTPS server — configure your domain and SSL certificate paths
    # To enable: rename your cert files to fullchain.pem and privkey.pem
    # and place them in infrastructure/nginx/ssl/
    server {
        listen 443 ssl http2;
        server_name _;   # Replace _ with your actual domain name

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern SSL settings
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection "1; mode=block" always;

        client_max_body_size 10M;

        # Connection limit per IP
        limit_conn conn_limit 20;

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Static files (served directly)
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Media files
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Admin panel (FastAPI SQLAdmin) — all /admin/* endpoints
        location /admin {
            proxy_pass http://django_admin_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Legacy admin API prefix — also handled by FastAPI core
        location /api/admin/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://django_admin_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Legacy auth endpoints — route stale clients to FastAPI gateway.
        # The gateway keeps /auth/* as an alias for auth-service root routes.
        location /auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Legacy React auth endpoints — older bundles call /api/auth/* while
        # the gateway's public contract is /api/v1/auth/*.
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            rewrite ^/api/auth/(.*)$ /api/v1/auth/$1 break;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Versioned API endpoints — routed to the FastAPI gateway
        location /api/v1/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Legacy API endpoints — routed to the core backend
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://core_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket endpoint
        location /ws/ {
            proxy_pass http://websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # React frontend (admin-panel + main app)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 512k;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }
    }

    # Django admin panel + Swagger UI — port 8000
    # Access:
    #   Django admin:  http://<host>:8000/admin/
    #   Swagger UI:    http://<host>:8000/api/docs/
    #   OpenAPI schema: http://<host>:8000/api/schema/
    server {
        listen 8000;
        server_name _;

        client_max_body_size 10M;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location / {
            # Use a variable so nginx defers DNS resolution to request time via
            # the Docker resolver (127.0.0.11) instead of resolving at startup.
            # Without this, nginx fails to start with "host not found in upstream
            # django-admin:8000" when the django-admin container is not yet up.
            set $django_admin_backend http://django-admin:8000;
            proxy_pass $django_admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
