# Nginx configuration for the monolith deployment
# Routes traffic to: backend-monolith (API), user-frontend, admin-backend
#
# Proxy routing map:
#   /api/admin/*        → admin-backend:4010
#   /api/v1/auth/*      → backend-monolith:/auth/*     (strip /api/v1)
#   /api/v1/*           → backend-monolith:/api/v1/*   (categories, chat, search, etc.)
#   /api/users/*        → backend-monolith:/api/users/*
#   /api/procurements/* → backend-monolith:/purchases/* (domain rename)
#   /api/chat/*         → backend-monolith:/api/v1/chat/*
#   /api/payments/*     → backend-monolith:/wallets/*
#   /api/*              → backend-monolith:/*          (strip /api)
#   /socket.io/*        → backend-monolith:4000        (Socket.IO — default socket.io path)
#   /ws/*               → backend-monolith:4000        (WebSocket legacy path)
#   /admin-panel/       → user-frontend:3000           (Next.js admin panel page)
#   /admin              → user-frontend:3000           (alias of /admin-panel)
#   /account            → user-frontend:3000           (alias of /lk)
#   /lk/*               → user-frontend:3000
#   /                   → user-frontend:3000

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Use Docker's internal DNS resolver so upstream hostnames are re-resolved
    # at request time rather than at nginx startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream backend_monolith {
        server backend-monolith:4000;
        keepalive 32;
    }

    upstream admin_backend {
        server admin-backend:4010;
        keepalive 16;
    }

    upstream user_frontend {
        server user-frontend:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10M;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Admin panel auth — stricter rate limit
        location = /api/admin/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        # Admin API → admin-backend
        location /api/admin/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # /api/v1/auth/* → backend-monolith /auth/*
        location /api/v1/auth/ {
            rewrite ^/api/v1/auth/(.*)$ /auth/$1 break;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        # /api/v1/* → backend-monolith (categories, chat, search, notify, voting)
        location /api/v1/ {
            limit_req zone=api_limit burst=50 nodelay;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        # /api/users/* → backend-monolith (users_router at /api/users)
        location /api/users/ {
            limit_req zone=api_limit burst=50 nodelay;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        # /api/procurements/* → backend-monolith /purchases/* (domain rename)
        location /api/procurements/ {
            rewrite ^/api/procurements/(.*)$ /purchases/$1 break;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        # /api/chat/* → backend-monolith /api/v1/chat/*
        location /api/chat/ {
            rewrite ^/api/chat/(.*)$ /api/v1/chat/$1 break;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        # /api/payments/* → backend-monolith /wallets/*
        location /api/payments/ {
            rewrite ^/api/payments/(.*)$ /wallets/$1 break;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        # /api/* → backend-monolith /* (strip /api prefix for all other routes)
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        # Socket.IO WebSocket connections — default Socket.IO path is /socket.io/
        location /socket.io/ {
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Legacy /ws/* path kept for backward compatibility
        location /ws/ {
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Admin panel — Next.js page in user-frontend at /admin-panel.
        # The admin-frontend service was removed (issue #107); the Next.js app
        # serves both /admin-panel/ and /admin paths.
        location /admin-panel/ {
            set $upstream http://user-frontend:3000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Connection "";
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 512k;
        }

        # User personal account at /lk/* route
        location /lk/ {
            set $upstream http://user-frontend:3000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 512k;
        }

        # User frontend (main app)
        location / {
            set $upstream http://user-frontend:3000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 512k;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection "1; mode=block" always;

        client_max_body_size 10M;
        limit_conn conn_limit 20;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location = /api/admin/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        location /api/admin/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/v1/auth/ {
            rewrite ^/api/v1/auth/(.*)$ /auth/$1 break;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        location /api/v1/ {
            limit_req zone=api_limit burst=50 nodelay;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        location /api/users/ {
            limit_req zone=api_limit burst=50 nodelay;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        location /api/procurements/ {
            rewrite ^/api/procurements/(.*)$ /purchases/$1 break;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        location /api/chat/ {
            rewrite ^/api/chat/(.*)$ /api/v1/chat/$1 break;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        location /api/payments/ {
            rewrite ^/api/payments/(.*)$ /wallets/$1 break;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection "";
        }

        # Socket.IO WebSocket connections — default Socket.IO path is /socket.io/
        location /socket.io/ {
            set $upstream http://backend-monolith:4000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Legacy /ws/* path kept for backward compatibility
        location /ws/ {
