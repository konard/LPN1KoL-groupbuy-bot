version: "3.9"

##############################################################################
# docker-compose.python.yml — unified Python/FastAPI stack (monolith edition)
#
# All backend microservices (auth, purchases, payments, chat, notifications,
# analytics, search, reputation) are merged into a single `backend` container.
# Swagger UI available at http://localhost:4000/docs
#
# Usage:
#   cp .env.example .env
#   docker compose -f docker-compose.python.yml up -d
#
# Memory budget (≈ 3 GB host):
#   postgres 512M | redis 256M | zookeeper 128M | kafka 512M | centrifugo 192M
#   django-admin 512M | core 192M | bot 256M | telegram-adapter 128M
#   mattermost-adapter 64M | websocket-server 96M | frontend-react 64M
#   nginx 64M | certbot 32M | gateway 128M | backend 384M
#   Total ≈ 3538 MB  (fits on 4 GB; previously 8 separate containers ≈ 1024 MB)
##############################################################################

networks:
  groupbuy-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  letsencrypt_data:
  certbot_webroot:

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: groupbuy-postgres
    restart: on-failure:3
    environment:
      - POSTGRES_DB=${DB_NAME:-groupbuy}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - groupbuy-network
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: groupbuy-redis
    restart: on-failure:3
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: groupbuy-zookeeper
    restart: on-failure:3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx64m -Xms64m"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 5 bash -c 'cat > /dev/tcp/localhost/2181' && echo OK"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: groupbuy-kafka
    restart: on-failure:3
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
      KAFKA_JVM_PERFORMANCE_OPTS: "-XX:MetaspaceSize=96m -XX:MaxMetaspaceSize=256m"
      KAFKA_LOG_CLEANER_ENABLE: "false"
      KAFKA_LOG_SEGMENT_BYTES: 16777216
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 60000
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: groupbuy-centrifugo
    command: centrifugo -c /centrifugo/config.json
    restart: on-failure:3
    environment:
      CENTRIFUGO_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - ./services/chat-service/centrifugo/centrifugo.json:/centrifugo/config.json
    ports:
      - "8001:8000"
    networks:
      - groupbuy-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 192M

  # ── Python Core (replaces Rust core) ──────────────────────────────────────

  core:
    build:
      context: ./core-rust
      dockerfile: Dockerfile.python
    container_name: groupbuy-core
    restart: on-failure:3
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-groupbuy}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 192M

  # ── Django Admin ───────────────────────────────────────────────────────────

  django-admin:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/django-admin:${IMAGE_TAG:-main}
    build:
      context: ./core
    container_name: groupbuy-django-admin
    restart: on-failure:3
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-groupbuy}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-this-in-production}
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,localhost:8000,127.0.0.1,0.0.0.0,${DOMAIN:-},${EXTERNAL_IP:-},groupbuy-django-admin,groupbuy-core,gateway,nginx
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8000,http://localhost:3000}
      - CORS_ALLOW_ALL_ORIGINS=${CORS_ALLOW_ALL_ORIGINS:-True}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://localhost}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@localhost}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Unified Backend Monolith ───────────────────────────────────────────────
  # All Python microservices merged into one FastAPI app.
  # Swagger UI: http://localhost:4000/docs
  # OpenAPI schema: http://localhost:4000/openapi.json

  backend:
    build:
      context: ./services/backend-monolith
      dockerfile: Dockerfile
    container_name: groupbuy-backend
    restart: on-failure:3
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-groupbuy}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      JWT_EXPIRES_MINUTES: "15"
      JWT_REFRESH_EXPIRES_DAYS: "7"
      BCRYPT_ROUNDS: "10"
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: backend-monolith
      CENTRIFUGO_URL: http://centrifugo:8000
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-centrifugo_api_key}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Groupbuy <notifications@example.com>}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 384M

  # ── Bot + Adapters ─────────────────────────────────────────────────────────

  bot:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/bot:${IMAGE_TAG:-main}
    build:
      context: ./bot
    container_name: groupbuy-bot
    restart: on-failure:3
    environment:
      - CORE_API_URL=http://core:8000/api
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      core:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network
    deploy:
      resources:
        limits:
          memory: 256M

  telegram-proxy:
    image: serjs/go-socks5-proxy:latest
    container_name: groupbuy-telegram-proxy
    restart: on-failure:3
    networks:
      - groupbuy-network
    profiles:
      - proxy
    deploy:
      resources:
        limits:
          memory: 32M

  telegram-adapter:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/telegram-adapter:${IMAGE_TAG:-main}
    build:
      context: ./adapters/telegram
    container_name: groupbuy-telegram-adapter
    restart: on-failure:3
    environment:
      - BOT_SERVICE_URL=http://bot:8001
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_PROXY_URL=${TELEGRAM_PROXY_URL:-}
      - TELEGRAM_USE_PROXY=${TELEGRAM_USE_PROXY:-false}
    depends_on:
      bot:
        condition: service_started
    networks:
      - groupbuy-network
    deploy:
      resources:
        limits:
          memory: 128M

  mattermost-adapter:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/mattermost-adapter:${IMAGE_TAG:-main}
    build:
      context: ./adapters/mattermost
    container_name: groupbuy-mattermost-adapter
    restart: on-failure:3
    environment:
      - BOT_SERVICE_URL=http://bot:8001
      - MATTERMOST_URL=${MATTERMOST_URL}
      - MATTERMOST_TOKEN=${MATTERMOST_TOKEN}
      - MATTERMOST_WEBHOOK_URL=${MATTERMOST_WEBHOOK_URL}
      - MATTERMOST_ADAPTER_URL=${MATTERMOST_ADAPTER_URL:-http://mattermost-adapter:8002}
      - MATTERMOST_BOT_TOKEN=${MATTERMOST_BOT_TOKEN:-}
    ports:
      - "8002:8002"
    depends_on:
      bot:
        condition: service_started
    networks:
      - groupbuy-network
    deploy:
      resources:
        limits:
          memory: 64M

  websocket-server:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/websocket:${IMAGE_TAG:-main}
    build:
      context: ./infrastructure/websocket
    container_name: groupbuy-websocket
    restart: on-failure:3
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
      - CORE_API_URL=http://core:8000/api
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      core:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 96M

  frontend-react:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/frontend:${IMAGE_TAG:-main}
    build:
      context: ./frontend-react
    container_name: groupbuy-frontend
    restart: on-failure:3
    depends_on:
      - core
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M

  nginx:
    image: nginx:alpine
    container_name: groupbuy-nginx
    restart: on-failure:3
    entrypoint: ["/docker-entrypoint-custom.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx-api.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt_data:/etc/letsencrypt:ro
    depends_on:
      core:
        condition: service_healthy
      django-admin:
        condition: service_started
      websocket-server:
        condition: service_healthy
      frontend-react:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - groupbuy-network
    deploy:
      resources:
        limits:
          memory: 64M

  certbot:
    image: certbot/certbot:latest
    container_name: groupbuy-certbot
    restart: on-failure:3
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks:
      - groupbuy-network
    deploy:
      resources:
        limits:
          memory: 32M

  # ── API Gateway ────────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: groupbuy-gateway
    restart: on-failure:3
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      BACKEND_URL: http://backend:4000
      AUTH_SERVICE_URL: http://backend:4000
      PURCHASE_SERVICE_URL: http://backend:4000
      PAYMENT_SERVICE_URL: http://backend:4000
      CHAT_SERVICE_URL: http://backend:4000
      NOTIFICATION_SERVICE_URL: http://backend:4000
      ANALYTICS_SERVICE_URL: http://backend:4000
      SEARCH_SERVICE_URL: http://backend:4000
      REPUTATION_SERVICE_URL: http://backend:4000
      RATE_LIMIT_RPM: "60"
      VOTING_RATE_LIMIT_RPM: "120"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
