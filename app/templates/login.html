<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #fff; border-radius: 8px; padding: 2.5rem; width: 340px; box-shadow: 0 4px 20px rgba(0,0,0,.3); }
    h2 { margin-bottom: 1.5rem; color: #1a1a2e; }
    label { display: block; margin-bottom: .3rem; font-size: .9rem; font-weight: 600; }
    input { width: 100%; padding: .6rem; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 1rem; font-size: 1rem; }
    button { width: 100%; padding: .75rem; background: #007bff; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    .error { color: #dc3545; margin-bottom: 1rem; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Admin Login</h2>
    {% if request.query_params.get("error") %}
      <p class="error">Invalid credentials. Please try again.</p>
    {% endif %}
    <form method="post" action="/login">
      <label>Username</label>
      <input name="username" type="text" required autofocus>
      <label>Password</label>
      <input name="password" type="password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
