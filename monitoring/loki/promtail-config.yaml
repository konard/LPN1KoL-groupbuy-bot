# Promtail configuration — issue #244.
#
# Discovers running containers through the Docker socket and tails their
# stdout/stderr JSON log files under /var/lib/docker/containers. Containers
# are labelled by name, image, and compose service so operators can filter
# in Grafana with queries like {container="groupbuy-core"}.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Strip the leading slash from /container-name
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project
      - source_labels: ["__meta_docker_container_image"]
        target_label: image
    pipeline_stages:
      # Docker writes one JSON object per log line: {"log":"...","stream":"stdout","time":"..."}
      - docker: {}
