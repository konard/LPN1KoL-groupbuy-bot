# Auto-provisioned Loki datasource — issue #244.
# Loaded by Grafana on startup from /etc/grafana/provisioning/datasources.

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 5000
      timeout: 60
