server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so upstream hostnames are resolved
    # at request time rather than at nginx startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Serve the React SPA at /admin-panel/ — Vite is built with base: '/admin-panel/'
    # so all asset URLs are prefixed with /admin-panel/. The alias maps the URL
    # prefix to the actual filesystem location (dist/ copied to nginx html root).
    location /admin-panel/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to admin-backend
    location /api/admin/ {
        set $admin_upstream http://admin-backend:4010;
        proxy_pass $admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # SPA fallback for root (used by healthcheck and direct access)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
