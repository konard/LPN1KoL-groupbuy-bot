server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so upstream hostnames are resolved
    # at request time rather than at nginx startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API requests to admin-backend
    location /api/admin/ {
        set $admin_upstream http://admin-backend:4010;
        proxy_pass $admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
