version: '3.9'

services:
  # Core API (FastAPI rewrite of core-rust)
  # Serves /api/users, /api/procurements, /api/payments, /api/chat on port 8000.
  # The frontend-react and bot connect to core:8000, NOT to gateway.
  # Gateway (port 3000) routes requests to the 8 microservices (auth, purchase, …).
  core:
    build: ./core-fastapi
    restart: on-failure:3
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-groupbuy}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # Bot service (command handlers)
  bot:
    build: ./bot
    command: python main.py
    restart: on-failure:3
    volumes:
      - ./bot:/app
    environment:
      - CORE_API_URL=http://core:8000/api
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      core:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network
    deploy:
      resources:
        limits:
          memory: 256M

  # SOCKS5 proxy for Telegram API (useful when api.telegram.org is blocked)
  # Enable by setting TELEGRAM_USE_PROXY=true in .env
  telegram-proxy:
    image: serjs/go-socks5-proxy:latest
    container_name: telegram-proxy
    restart: unless-stopped
    networks:
      - groupbuy-network
    profiles:
      - proxy

  # VK adapter
  vk-adapter:
    build: ./adapters/vk
    command: python adapter.py
    restart: on-failure:3
    environment:
      - BOT_SERVICE_URL=http://bot:8001
      - VK_TOKEN=${VK_TOKEN}
    depends_on:
      bot:
        condition: service_started
    networks:
      - groupbuy-network
    deploy:
      resources:
        limits:
          memory: 64M

  # WASM build (produces WebAssembly package from Rust)
  wasm-builder:
    build:
      context: .
      dockerfile: wasm-utils/Dockerfile
    volumes:
      - wasm_pkg:/wasm-pkg

  # WebSocket server for real-time chat
  websocket-server:
    build: ./infrastructure/websocket
    command: python chat_server.py
    restart: on-failure:3
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
      - CORE_API_URL=http://core:8000/api
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_healthy
    ports:
      - "8765:8765"
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 96M

  # Microservices API gateway — routes /api/v1/* to the 8 microservices.
  # Frontend should send requests to gateway (port 3000) for microservice API,
  # and to core (port 8000) for legacy /api/* endpoints.
  gateway:
    build:
      context: ./services/gateway
    restart: on-failure:3
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      JWT_ALGORITHM: HS256
      AUTH_SERVICE_URL: http://auth-service:4001
      PURCHASE_SERVICE_URL: http://purchase-service:4002
      PAYMENT_SERVICE_URL: http://payment-service:4003
      CHAT_SERVICE_URL: http://chat-service:4004
      NOTIFICATION_SERVICE_URL: http://notification-service:4005
      ANALYTICS_SERVICE_URL: http://analytics-service:4006
      SEARCH_SERVICE_URL: http://search-service:4007
      REPUTATION_SERVICE_URL: http://reputation-service:4008
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      RATE_LIMIT_RPM: "60"
      VOTING_RATE_LIMIT_RPM: "120"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3001:3000"
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M

  # Auth microservice — handles JWT login/registration/OTP via /auth/*
  auth-service:
    build:
      context: ./services/auth-service
    restart: on-failure:3
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/auth_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-jwt-refresh-secret}
      JWT_EXPIRES_IN_SECONDS: "900"
      JWT_REFRESH_EXPIRES_IN_SECONDS: "604800"
      BCRYPT_ROUNDS: "10"
      NOTIFICATION_SERVICE_URL: http://notification-service:4005
      CORE_API_URL: http://core:8000
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 96M

  # Purchase microservice — group buys with voting
  purchase-service:
    build:
      context: ./services/purchase-service
    restart: on-failure:3
    environment:
      PORT: 4002
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/purchase_db
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_CLIENT_ID: purchase-service
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 96M

  # Payment microservice — wallets, escrow, transactions
  payment-service:
    build:
      context: ./services/payment-service
    restart: on-failure:3
    environment:
      PORT: 4003
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/payment_db
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

  # Chat microservice — rooms, messages, Centrifugo integration
  chat-service:
    build:
      context: ./services/chat-service
    restart: on-failure:3
    environment:
      PORT: 4004
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/chat_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      CENTRIFUGO_URL: ${CENTRIFUGO_URL:-http://centrifugo:8000}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-centrifugo_api_key}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

  # Notification microservice — Kafka consumer, email/Telegram/WhatsApp/push
  notification-service:
    build:
      context: ./services/notification-service
    restart: on-failure:3
    environment:
      PORT: 4005
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_GROUP_ID: notification-group
      CENTRIFUGO_URL: ${CENTRIFUGO_URL:-http://centrifugo:8000}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-centrifugo_api_key}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Groupbuy <notifications@example.com>}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_API_URL: ${TELEGRAM_API_URL:-https://api.telegram.org}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

  # Analytics microservice — Kafka consumer, XLSX/CSV reports to S3
  analytics-service:
    build:
      context: ./services/analytics-service
    restart: on-failure:3
    environment:
      PORT: 4006
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_GROUP_ID: analytics-group
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio_admin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio_password}
      S3_BUCKET: ${S3_BUCKET:-analytics-reports}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # Search microservice — Elasticsearch + Redis cache
  search-service:
    build:
      context: ./services/search-service
    restart: on-failure:3
    environment:
      PORT: 4007
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4007/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

  # Reputation microservice — reviews, complaints, auto-block
  reputation-service:
    build:
      context: ./services/reputation-service
    restart: on-failure:3
    environment:
      PORT: 4008
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/reputation_db
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4008/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 96M

  # React frontend (with WASM integration)
  # Connects to core:8000 for /api/* legacy endpoints.
  # Auth requests (/api/v1/auth/*, /api/auth/*) are routed to gateway:3000.
  frontend-react:
    build: ./frontend-react
    restart: on-failure:3
    ports:
      - "3000:80"
    depends_on:
      core:
        condition: service_healthy
      gateway:
        condition: service_healthy
    networks:
      - groupbuy-network
    deploy:
      resources:
        limits:
          memory: 64M

  # ZooKeeper — required by Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: on-failure:3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx64m -Xms64m"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 5 bash -c 'cat > /dev/tcp/localhost/2181' && echo OK"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 96M

  # Kafka message broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: on-failure:3
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 384M

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    restart: on-failure:3
    environment:
      - POSTGRES_DB=${DB_NAME:-groupbuy}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      - "5432:5432"
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # Redis for cache and queues
  redis:
    image: redis:7-alpine
    restart: on-failure:3
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 160M

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  wasm_pkg:

networks:
  groupbuy-network:
    driver: bridge
