version: "3.9"

##############################################################################
# docker-compose.monolith.yml — consolidated monolith architecture
#
# Architecture:
#   backend-monolith  — Python 3.12 + FastAPI (port 4000)
#                       Consolidated modules: auth, purchase, payment, reputation,
#                       chat (Socket.IO), search (Elasticsearch), notification (httpx)
#                       includes core/ (Django utilities) and core-rust/ (compiled
#                       via PyO3 multi-stage build: Rust → .so → Python slim image)
#                       single PostgreSQL 15 (schemas: auth, purchase, payment, reputation, chat)
#                       Alembic migrations, Kafka producer for analytics-raw topic
#
#   admin-backend     — NestJS, read-only/CRUD access to monolith DB
#   admin-frontend    — React static build served by Nginx; proxies /api/admin/* to admin-backend
#   user-frontend     — Next.js SSR app (port 3000); nginx proxies / and /lk/ to it
#   nginx             — Reverse proxy / public entry point (ports 80, 443)
#                       Routes: /api/admin/* → admin-backend, /api/* → backend-monolith,
#                               /ws/* → backend-monolith (Socket.IO), / → user-frontend
#                       Config: infrastructure/nginx/nginx-monolith.conf
#   certbot           — Let's Encrypt certificate renewal
#   gateway           — Go (gorilla/mux) API gateway; all service URLs point to backend-monolith
#   analytics         — Python FastAPI; separate service, receives events from monolith via Kafka
#   bot               — Telegram/groupbuy bot (calls backend-monolith API)
#   telegram-adapter  — Telegram webhook adapter
#   mattermost-adapter — Mattermost webhook adapter
#
#   Removed (consolidated into backend-monolith):
#   - django-admin (Django admin panel)  → admin-backend (NestJS) + admin-frontend
#   - core (Rust binary)                 → backend-monolith FastAPI
#   - chat-service (Go + Centrifugo)     → Socket.IO (python-socketio)
#   - notification-service (Node.js)     → httpx-based async dispatch
#   - search-service (Go)                → elasticsearch-py[async]
#   - websocket-server (legacy)          → Socket.IO in backend-monolith
#
# Networks:
#   backend-network   — internal service communication
#   frontend-network  — frontend ↔ backend-monolith / admin-backend
#
# Usage:
#   cp .env.monolith.example .env
#   bash scripts/init-letsencrypt.sh   # optional, for HTTPS
#   docker compose -f docker-compose.monolith.yml up -d
#
# Sensitive vars are read from .env (see .env.monolith.example).
##############################################################################

networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge

volumes:
  postgres_monolith_data:
  elasticsearch_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log_data:
  clickhouse_data:
  minio_data:
  letsencrypt_data:
  certbot_webroot:

services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx64m -Xms64m"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log_data:/var/lib/zookeeper/log
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 5 bash -c 'cat > /dev/tcp/localhost/2181' && echo OK"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Fixed cluster ID prevents InconsistentClusterIdException when volumes are
      # recreated independently. Must stay stable; change only if you wipe both
      # kafka_data and zookeeper_data volumes together.
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"
      # Topics published by the monolith (auto-created on first publish):
      #   monolith.purchase.created, monolith.payment.success,
      #   monolith.payment.deposited, monolith.payment.escrow_created,
      #   monolith.reputation.review_created
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 384M

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 128M

  # Single PostgreSQL 15 instance for the monolith
  # Schemas: auth, purchase, payment, reputation, chat (created by Alembic migrations)
  postgres-monolith:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${MONOLITH_DB_NAME:-monolith_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_monolith_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # NOTE: postgres-chat removed — chat schema is part of monolith_db (see migration 0002).
  # backend-monolith connects to postgres-monolith for all data including chat.

  # Redis — general cache + Socket.IO pub/sub for horizontal scaling
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    environment:
      CLICKHOUSE_DB: chat_history
      CLICKHOUSE_USER: clickhouse_user
      CLICKHOUSE_PASSWORD: clickhouse_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    networks:
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 640M

  # NOTE: centrifugo has been removed — real-time chat is handled by Socket.IO
  # inside backend-monolith (python-socketio). Centrifugo is not part of the
  # monolith architecture.

  # ─────────────────────────────────────────────
  # Backend Monolith (auth + purchase + payment + reputation)
  # Includes core/ (Django utilities) and core-rust/ (compiled via PyO3)
  # ─────────────────────────────────────────────

  backend-monolith:
    build:
      # Build context is repo root so core/ and core-rust/ are accessible
      context: .
      dockerfile: backend-monolith/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 4000
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres-monolith:5432/${MONOLITH_DB_NAME:-monolith_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: 15
      JWT_REFRESH_EXPIRES_DAYS: 7
      BCRYPT_ROUNDS: 10
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: backend-monolith
      ANALYTICS_TOPIC: analytics-raw
      # Consolidated: search, notification, chat now run inside this service
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: purchases
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      FIREBASE_SERVER_KEY: ${FIREBASE_SERVER_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Groupbuy <notifications@example.com>}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      postgres-monolith:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

  # ─────────────────────────────────────────────
  # Admin Panel (NestJS backend + React/Nginx frontend)
  # ─────────────────────────────────────────────

  # NestJS admin backend — read-only/CRUD access to monolith DB
  # JWT secret is shared with backend-monolith for unified auth
  admin-backend:
    build:
      context: ./admin-backend
      dockerfile: Dockerfile
    ports:
      - "4010:4010"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 4010
      # Read-only connection to monolith PostgreSQL
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres-monolith:5432/${MONOLITH_DB_NAME:-monolith_db}
      # Shared JWT secret for token validation
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      NODE_ENV: production
    depends_on:
      postgres-monolith:
        condition: service_healthy
      backend-monolith:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4010/api/admin/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M

  # React static admin frontend served by Nginx
  # Nginx proxies /api/admin/* to admin-backend
  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      admin-backend:
        condition: service_started
    networks:
      - frontend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 32M

  # ─────────────────────────────────────────────
  # User Personal Account (React + Vite, served by Nginx)
  # ─────────────────────────────────────────────

  user-frontend:
    build:
      context: ./user-frontend
      dockerfile: Dockerfile
    # Next.js standalone server listens on PORT (default 3000).
    # nginx-monolith.conf proxies / and /lk/ to user-frontend:3000.
    # HOSTNAME=0.0.0.0 forces the Next.js standalone server to bind on all
    # interfaces. Without it, Next.js reads the container's $HOSTNAME (which
    # Docker sets to the container ID), resolves that to the container's primary
    # IP, and only binds there — making localhost:3000 unreachable for the
    # healthcheck.
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    depends_on:
      backend-monolith:
        condition: service_healthy
    networks:
      - frontend-network
    restart: unless-stopped
    healthcheck:
      # Use node's built-in http module so the check works without wget/curl.
      # /api/health is a Next.js API route (pages/api/health.js) and is served
      # locally — it is not affected by the /api/:path* proxy rewrite because
      # afterFiles rewrites only fire when no filesystem route matches.
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3000/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 128M

  # ─────────────────────────────────────────────
  # Nginx reverse proxy (public entry point)
  # ─────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: groupbuy-nginx-monolith
    restart: unless-stopped
    entrypoint: ["/docker-entrypoint-custom.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx-monolith.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt_data:/etc/letsencrypt:ro
    depends_on:
      backend-monolith:
        condition: service_healthy
      admin-backend:
        condition: service_started
      user-frontend:
        condition: service_healthy
      admin-frontend:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network
    deploy:
      resources:
        limits:
          memory: 64M

  certbot:
    image: certbot/certbot:latest
    container_name: groupbuy-certbot-monolith
    restart: unless-stopped
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks:
      - frontend-network
    deploy:
      resources:
        limits:
          memory: 32M

  # ─────────────────────────────────────────────
  # Infrastructure Services (unchanged from microservices layout)
  # ─────────────────────────────────────────────

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      # Monolith handles auth, purchases, payments, reputation
      AUTH_SERVICE_URL: http://backend-monolith:4000
      PURCHASE_SERVICE_URL: http://backend-monolith:4000
      PAYMENT_SERVICE_URL: http://backend-monolith:4000
      REPUTATION_SERVICE_URL: http://backend-monolith:4000
      # Chat, Search, Notification consolidated into backend-monolith
      CHAT_SERVICE_URL: http://backend-monolith:4000
      SEARCH_SERVICE_URL: http://backend-monolith:4000
      NOTIFICATION_SERVICE_URL: http://backend-monolith:4000
      ANALYTICS_SERVICE_URL: http://analytics-service:4006
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-60}
      VOTING_RATE_LIMIT_RPM: ${VOTING_RATE_LIMIT_RPM:-120}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      redis:
        condition: service_healthy
      backend-monolith:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M

  # NOTE: chat-service, notification-service, and search-service have been
  # consolidated into backend-monolith. These definitions are kept as comments
  # for reference but are NOT started in monolith deployment mode.
  #
  # chat-service: Go + Centrifugo replaced by Socket.IO in backend-monolith
  # notification-service: Node.js replaced by httpx-based service in backend-monolith
  # search-service: Go + Elasticsearch replaced by elasticsearch-py in backend-monolith

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    ports:
      - "4006:4006"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 4006
      # Consumes monolith.* Kafka topics
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: analytics-group
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio_admin
      S3_SECRET_KEY: minio_password
      S3_BUCKET: analytics-reports
      CLICKHOUSE_DSN: clickhouse://clickhouse_user:clickhouse_password@clickhouse:9000/chat_history
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # search-service: consolidated into backend-monolith (see note above)

  # ─────────────────────────────────────────────
  # Bot and messaging adapters
  # ─────────────────────────────────────────────

  bot:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/bot:${IMAGE_TAG:-main}
    build:
      context: ./bot
    container_name: groupbuy-bot-monolith
    restart: unless-stopped
    environment:
      # backend-monolith exposes the same /api/* surface as the old core service
      - CORE_API_URL=http://backend-monolith:4000/api
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      backend-monolith:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 256M

  telegram-proxy:
    # Only starts when the "proxy" profile is active:
    #   docker compose -f docker-compose.monolith.yml --profile proxy up -d
    # AND set TELEGRAM_USE_PROXY=true in .env.
    image: serjs/go-socks5-proxy:latest
    container_name: groupbuy-telegram-proxy-monolith
    restart: unless-stopped
    networks:
      - backend-network
    profiles:
      - proxy
    deploy:
      resources:
        limits:
          memory: 32M

  telegram-adapter:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/telegram-adapter:${IMAGE_TAG:-main}
    build:
      context: ./adapters/telegram
    container_name: groupbuy-telegram-adapter-monolith
    restart: unless-stopped
    environment:
      - BOT_SERVICE_URL=http://bot:8001
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_PROXY_URL=${TELEGRAM_PROXY_URL:-}
      - TELEGRAM_USE_PROXY=${TELEGRAM_USE_PROXY:-false}
    depends_on:
      bot:
        condition: service_started
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 128M

  mattermost-adapter:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/mattermost-adapter:${IMAGE_TAG:-main}
    build:
      context: ./adapters/mattermost
    container_name: groupbuy-mattermost-adapter-monolith
    restart: unless-stopped
    environment:
      - BOT_SERVICE_URL=http://bot:8001
      - MATTERMOST_URL=${MATTERMOST_URL:-}
      - MATTERMOST_TOKEN=${MATTERMOST_TOKEN:-}
      - MATTERMOST_WEBHOOK_URL=${MATTERMOST_WEBHOOK_URL:-}
      - MATTERMOST_ADAPTER_URL=${MATTERMOST_ADAPTER_URL:-http://mattermost-adapter:8002}
      - MATTERMOST_BOT_TOKEN=${MATTERMOST_BOT_TOKEN:-}
    ports:
      - "8002:8002"
    depends_on:
      bot:
        condition: service_started
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 64M

  # ─────────────────────────────────────────────
  # Monitoring
  # ─────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    networks:
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/main.json
    ports:
      - "3002:3000"
    networks:
      - backend-network
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
