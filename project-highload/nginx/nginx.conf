worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Upstream: multiple backend replicas (round-robin)
    upstream backend {
        least_conn;
        server backend:8000;
        keepalive 32;
    }

    # Upstream: WebSocket with sticky sessions via IP hash
    # (Use ip_hash for sticky sessions; override with cookie-based in paid nginx)
    upstream websocket {
        ip_hash;
        server websocket:8001;
        keepalive 64;
    }

    # Upstream: Django admin
    upstream admin {
        server admin:8002;
        keepalive 8;
    }

    # Upstream: React frontend
    upstream frontend {
        server frontend:80;
        keepalive 8;
    }

    server {
        listen 80;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }

        # REST API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # WebSocket with sticky session cookie
        location /ws {
            proxy_pass http://websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Sticky session cookie (simple approach — SERVER_ID set by websocket service)
            add_header Set-Cookie "SERVER_ID=$upstream_addr; Path=/; HttpOnly" always;
        }

        # Django admin panel
        location /admin/ {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /static/ {
            proxy_pass http://admin;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://backend/health;
        }
    }
}
