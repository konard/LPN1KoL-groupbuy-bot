worker_processes auto;
worker_rlimit_nofile 200000;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=5s ipv6=off;

    log_format main '$remote_addr "$request" $status $body_bytes_sent '
                    'rt=$request_time upstream=$upstream_addr '
                    'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    keepalive_requests 10000;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api_rate:20m rate=200r/s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $cookie_SERVER_ID $sticky_key {
        default $cookie_SERVER_ID;
        '' $request_id;
    }

    upstream backend_upstream {
        zone backend_upstream 64k;
        least_conn;
        server backend:8000 resolve;
        keepalive 128;
    }

    upstream websocket_upstream {
        zone websocket_upstream 64k;
        hash $sticky_key consistent;
        server websocket:8001 resolve;
        keepalive 256;
    }

    upstream admin_upstream {
        zone admin_upstream 64k;
        server admin:8002 resolve;
        keepalive 32;
    }

    upstream frontend_upstream {
        zone frontend_upstream 64k;
        server frontend:80 resolve;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 10m;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location = /backend/readyz {
            proxy_pass http://backend_upstream/readyz;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location = /websocket/readyz {
            proxy_pass http://websocket_upstream/readyz;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/ {
            limit_req zone=api_rate burst=1000 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /ws/ {
            proxy_pass http://websocket_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 5s;
            proxy_buffering off;
            add_header Set-Cookie "SERVER_ID=$sticky_key; Path=/; HttpOnly; SameSite=Lax" always;
        }

        location /admin/ {
            proxy_pass http://admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /static/ {
            proxy_pass http://admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
}
