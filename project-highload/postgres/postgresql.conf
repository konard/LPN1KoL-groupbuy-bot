# Local high-load baseline. Tune these values against real host memory before
# production use; PgBouncer keeps application connection spikes away from
# PostgreSQL itself.
listen_addresses = '*'
port = 5432
max_connections = 300
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 8MB
maintenance_work_mem = 128MB
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 256MB
random_page_cost = 1.1
effective_io_concurrency = 200
idle_in_transaction_session_timeout = 30000
log_min_duration_statement = 500
log_connections = off
log_disconnections = off
