version: "3.9"

name: groupbuy-highload

networks:
  highload:
    driver: bridge

volumes:
  postgres_data:

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-groupbuy}
      POSTGRES_USER: ${POSTGRES_USER:-groupbuy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-groupbuy}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - highload
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

  pgbouncer:
    build:
      context: ./pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-groupbuy}
      DB_USER: ${POSTGRES_USER:-groupbuy}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-groupbuy}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-10000}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-80}
      RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-20}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - highload
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U \"$${DB_USER}\" -d \"$${DB_NAME}\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxclients
      - "20000"
      - --tcp-keepalive
      - "60"
    networks:
      - highload
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-groupbuy}:${POSTGRES_PASSWORD:-groupbuy}@pgbouncer:6432/${POSTGRES_DB:-groupbuy}
      DATABASE_POOL_SIZE: ${BACKEND_DB_POOL_SIZE:-20}
      DATABASE_MAX_OVERFLOW: ${BACKEND_DB_MAX_OVERFLOW:-40}
      REDIS_URL: redis://redis:6379/0
      REDIS_CHANNEL: items:new
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - highload
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  websocket:
    build:
      context: ./websocket
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_CHANNEL: items:new
      WS_HEARTBEAT_SECONDS: ${WS_HEARTBEAT_SECONDS:-25}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - highload
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M

  admin:
    build:
      context: ./admin
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,admin,nginx}
      DATABASE_HOST: pgbouncer
      DATABASE_PORT: "6432"
      DATABASE_NAME: ${POSTGRES_DB:-groupbuy}
      DATABASE_USER: ${POSTGRES_USER:-groupbuy}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-groupbuy}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin}
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - highload
    expose:
      - "8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/healthz', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-/ws/items}
    restart: unless-stopped
    networks:
      - highload
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      websocket:
        condition: service_healthy
      admin:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - highload
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 128M
