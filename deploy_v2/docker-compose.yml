version: "3.9"

# GroupBuy v2 — 4-service Docker architecture
# Usage: docker compose up --build
#
# Services:
#   1. frontend-client  — React SPA (Nginx, port 80 via reverse proxy)
#   2. backend          — FastAPI REST API + Redis Pub/Sub publisher
#   3. frontend-admin   — FastAPI admin panel (port 8080 via reverse proxy)
#   4. socket-broker    — FastAPI WebSocket + Redis Pub/Sub subscriber
#
# Infrastructure:
#   - db     (PostgreSQL 16)
#   - redis  (Redis 7)
#   - nginx  (reverse proxy, single entry point on port 80)

services:

  # ── Database ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: groupbuy
      POSTGRES_USER: groupbuy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-groupbuy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groupbuy"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (Pub/Sub broker between backend and socket-service) ─────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Service 2: Backend Core (Python / FastAPI) ────────────────────────────
  backend:
    build: ./services/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://groupbuy:${DB_PASSWORD:-groupbuy}@db:5432/groupbuy
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Service 4: Socket Service (Centralized WebSocket broker) ──────────────
  socket-broker:
    build: ./services/socket-service
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      BACKEND_URL: http://backend:8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Service 3: Admin Panel ────────────────────────────────────────────────
  frontend-admin:
    build: ./services/frontend-admin
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  # ── Service 1: Frontend Client (React → Nginx) ───────────────────────────
  frontend-client:
    build:
      context: ./services/frontend-client
      args:
        VITE_BACKEND_URL: /api
        VITE_SOCKET_URL: ws://${DOMAIN:-localhost}/socket
    restart: unless-stopped

  # ── Nginx reverse proxy (single entry point) ─────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-client
      - backend
      - socket-broker
      - frontend-admin

volumes:
  postgres_data:
