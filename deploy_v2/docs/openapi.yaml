openapi: 3.1.0
info:
  title: GroupBuy Backend API
  description: 'REST API for the GroupBuy platform — group purchasing management.


    **Authentication**: Bearer JWT token. Obtain via `POST /auth/login`.


    **Roles**: regular users can manage their own data; admin users can manage all
    resources.


    Interactive docs: `/docs` (Swagger UI) · `/redoc` (ReDoc)'
  contact:
    name: GroupBuy Team
  version: 2.0.0
paths:
  /auth/register:
    post:
      summary: Register
      description: Register a new user. Requires username, phone number, email, and
        password.
      operationId: register_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/login:
    post:
      summary: Login
      description: 'Step 1 of phone-based login.


        Validates phone + password. On success, generates a one-time 6-digit code

        and sends it to the email address the user provided at registration.

        The client must then call POST /auth/verify-code with the phone and code

        to receive the Bearer token.'
      operationId: login_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginCodeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/verify-code:
    post:
      summary: Verify Code
      description: 'Step 2 of phone-based login.


        Validates the one-time code sent to the user''s email after POST /auth/login.

        Returns a Bearer JWT token on success.'
      operationId: verify_code_auth_verify_code_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCodeVerify'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/me:
    get:
      summary: Me
      operationId: me_auth_me_get
