<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GroupBuy Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header a { color: #a8d8ea; text-decoration: none; }
    main { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .card { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 4px rgba(0,0,0,.08); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .6rem .8rem; border-bottom: 1px solid #eee; }
    th { background: #f9f9f9; font-weight: 600; }
    .badge { display: inline-block; padding: .2rem .5rem; border-radius: 4px; font-size: .8rem; font-weight: 600; }
    .badge-green { background: #d4edda; color: #155724; }
    .badge-red { background: #f8d7da; color: #721c24; }
    .btn { display: inline-block; padding: .3rem .8rem; border: none; border-radius: 4px; cursor: pointer; font-size: .85rem; text-decoration: none; }
    .btn-warn { background: #ffc107; color: #333; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-primary { background: #007bff; color: #fff; }
    form { display: inline; }
  </style>
</head>
<body>
  <header>
    <strong>GroupBuy Admin</strong>
    <div>
      <a href="/dashboard" style="margin-right:.8rem">Dashboard</a>
      <a href="/" style="margin-right:.8rem">Users</a>
      <a href="/procurements" style="margin-right:.8rem">Procurements</a>
      <a href="/categories" style="margin-right:.8rem">Categories</a>
      <a href="/payments" style="margin-right:.8rem">Payments</a>
      <a href="/logout">Logout</a>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
