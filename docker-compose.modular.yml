version: "3.9"

# Modular 4-service architecture for GroupBuy
# Usage: docker compose -f docker-compose.modular.yml up -d

services:

  # ── Database ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: groupbuy
      POSTGRES_USER: groupbuy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-groupbuy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groupbuy"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (FastAPI REST API) ─────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://groupbuy:${DB_PASSWORD:-groupbuy}@db:5432/groupbuy
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Socket Service (FastAPI WebSocket) ────────────────────────────────────
  socket:
    build: ./socket
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      BACKEND_URL: http://backend:8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
    depends_on:
      backend:
        condition: service_healthy

  # ── Admin Panel ────────────────────────────────────────────────────────────
  admin:
    build: ./admin
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  # ── Frontend (React → Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: /api
        VITE_SOCKET_URL: ws://${DOMAIN:-localhost}/socket
    restart: unless-stopped

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/modular.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - socket
      - admin

volumes:
  postgres_data:
