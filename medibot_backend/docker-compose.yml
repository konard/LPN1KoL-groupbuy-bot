services:
  bot:
    build: .
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-replace-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://medibot:medibot@postgres:5432/medibot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://medibot:medibot@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-UTC}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-5}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      - postgres
      - redis
      - rabbitmq

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://medibot:medibot@postgres:5432/medibot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://medibot:medibot@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-5}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      - postgres
      - redis
      - rabbitmq

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: medibot
      POSTGRES_USER: medibot
      POSTGRES_PASSWORD: medibot
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: medibot
      RABBITMQ_DEFAULT_PASS: medibot
    ports:
      - "15673:15672"

volumes:
  postgres_data:
