services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      APP_ENV: local
      DB_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis
      - rabbitmq

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work --sleep=1 --tries=3
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - rabbitmq
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mapsoft
      POSTGRES_USER: mapsoft
      POSTGRES_PASSWORD: mapsoft
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5438:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6388:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: mapsoft
      RABBITMQ_DEFAULT_PASS: mapsoft
    ports:
      - "5688:5672"
      - "15688:15672"

volumes:
  postgres_data:
