stages:
  - test
  - build
  - deploy

php_tests:
  stage: test
  image: php:8.1-cli
  services:
    - postgres:15
    - redis:7
  script:
    - apt-get update
    - apt-get install -y git unzip libpq-dev
    - docker-php-ext-install pdo_pgsql
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --prefer-dist
    - php artisan test

frontend_build:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build

docker_image:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  script:
    - docker compose config
    - docker build -f docker/php/Dockerfile -t mapsoft-platform:${CI_COMMIT_SHA} .

deploy_production:
  stage: deploy
  image: alpine:3.20
  script:
    - test -n "$DEPLOY_HOST"
    - test -n "$DEPLOY_USER"
  only:
    - main
